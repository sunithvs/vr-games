<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON LABYRINTH — WebXR Concept</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00f5ff;
    --pink: #ff006e;
    --purple: #8b00ff;
    --yellow: #ffe000;
    --bg: #020408;
    --panel: rgba(0,245,255,0.05);
  }

  body {
    background: var(--bg);
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    height: 100vh;
    cursor: crosshair;
  }

  /* ── CANVAS ── */
  #gameCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── HUD OVERLAY ── */
  #hud {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* Scanline effect */
  #hud::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,245,255,0.015) 2px,
      rgba(0,245,255,0.015) 4px
    );
    pointer-events: none;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 60px;
    height: 60px;
    border-color: var(--cyan);
    border-style: solid;
    opacity: 0.7;
  }
  .corner.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

  /* Stats bar */
  #stats-bar {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 40px;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .stat-block { text-align: center; }
  .stat-label { color: rgba(0,245,255,0.5); font-size: 9px; }
  .stat-value {
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
    text-shadow: 0 0 20px currentColor;
    transition: all 0.2s;
  }
  .stat-value.score { color: var(--yellow); }
  .stat-value.health { color: #00ff88; }
  .stat-value.wave { color: var(--pink); }

  /* Health bar */
  #health-bar-wrap {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    text-align: center;
  }
  #health-bar-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: rgba(0,245,255,0.5);
    margin-bottom: 6px;
  }
  #health-bar-bg {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(0,245,255,0.3);
    position: relative;
    overflow: hidden;
  }
  #health-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #00ff88, #00f5ff);
    box-shadow: 0 0 15px #00ff88;
    transition: width 0.3s;
    width: 75%;
  }

  /* Crosshair */
  #crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    transition: all 0.1s;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after  { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
  #crosshair.hit { transform: translate(-50%, -50%) scale(1.8); }
  #crosshair.hit::before, #crosshair.hit::after { background: var(--pink); box-shadow: 0 0 12px var(--pink); }

  /* Ammo dots */
  #ammo {
    position: absolute;
    bottom: 90px;
    right: 40px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
  }
  #ammo-label { font-size: 9px; letter-spacing: 3px; color: rgba(0,245,255,0.4); margin-bottom: 4px; text-align: right; }
  .ammo-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    transition: all 0.2s;
  }
  .ammo-dot.used { background: rgba(0,245,255,0.15); box-shadow: none; }

  /* Kill feed */
  #killfeed {
    position: absolute;
    top: 80px;
    right: 30px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
    font-size: 10px;
    letter-spacing: 2px;
  }
  .kill-entry {
    color: var(--pink);
    text-shadow: 0 0 10px var(--pink);
    animation: killFade 2s forwards;
    padding: 2px 8px;
    border-right: 2px solid var(--pink);
  }
  @keyframes killFade { 0%{opacity:1; transform:translateX(0)} 70%{opacity:1} 100%{opacity:0; transform:translateX(30px)} }

  /* Wave alert */
  #wave-alert {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 10px;
    text-align: center;
    color: var(--pink);
    text-shadow: 0 0 40px var(--pink), 0 0 80px var(--pink);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  #wave-alert.show { opacity: 1; }
  #wave-alert.show { animation: waveFlash 2s forwards; }
  @keyframes waveFlash {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(1.3); }
    20%  { opacity:1; transform:translate(-50%,-50%) scale(1); }
    70%  { opacity:1; }
    100% { opacity:0; transform:translate(-50%,-50%) scale(0.9); }
  }

  /* Mini map */
  #minimap {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 120px;
    height: 120px;
    border: 1px solid rgba(0,245,255,0.3);
    background: rgba(0,0,0,0.7);
  }
  #minimap canvas { width: 100%; height: 100%; }

  /* Controls info */
  #controls {
    position: absolute;
    top: 80px;
    left: 30px;
    font-size: 10px;
    color: rgba(0,245,255,0.35);
    letter-spacing: 1px;
    line-height: 1.8;
    border-left: 1px solid rgba(0,245,255,0.15);
    padding-left: 12px;
  }

  /* VR button */
  #vr-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--bg);
    background: var(--cyan);
    border: none;
    padding: 10px 30px;
    cursor: pointer;
    pointer-events: all;
    text-transform: uppercase;
    box-shadow: 0 0 30px var(--cyan);
    transition: all 0.2s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  #vr-btn:hover { background: var(--pink); box-shadow: 0 0 40px var(--pink); color: white; }

  /* Hit flash */
  #hit-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, var(--pink) 100%);
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 0.05s;
  }
  #hit-flash.flash { opacity: 0.4; }

  /* Shoot flash */
  #shoot-flash {
    position: fixed;
    inset: 0;
    background: var(--cyan);
    opacity: 0;
    pointer-events: none;
    z-index: 21;
  }

  /* Title screen */
  #title-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.8s;
  }
  #title-screen.hidden { opacity: 0; pointer-events: none; }

  #title-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(32px, 6vw, 72px);
    font-weight: 900;
    letter-spacing: 12px;
    text-align: center;
    background: linear-gradient(135deg, var(--cyan), var(--pink), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    animation: titleGlow 3s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 30px var(--cyan));
  }
  @keyframes titleGlow {
    from { filter: drop-shadow(0 0 20px var(--cyan)); }
    to   { filter: drop-shadow(0 0 50px var(--pink)); }
  }

  #title-sub {
    font-size: 11px;
    letter-spacing: 8px;
    color: rgba(0,245,255,0.5);
    text-transform: uppercase;
  }

  #start-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--bg);
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border: none;
    padding: 14px 50px;
    cursor: pointer;
    margin-top: 20px;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
    box-shadow: 0 0 40px var(--cyan);
    font-weight: 700;
    transition: all 0.2s;
  }
  #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 60px var(--pink); }

  #title-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridScroll 8s linear infinite;
    perspective: 400px;
  }
  @keyframes gridScroll {
    from { background-position: 0 0; }
    to   { background-position: 0 60px; }
  }
</style>
</head>
<body>

<!-- Title Screen -->
<div id="title-screen">
  <div id="title-grid"></div>
  <div id="title-logo">NEON<br>LABYRINTH</div>
  <div id="title-sub">A WebXR Dungeon Crawler</div>
  <button id="start-btn" onclick="startGame()">ENTER THE MAZE</button>
  <div style="font-size:9px;letter-spacing:3px;color:rgba(0,245,255,0.25);margin-top:10px;">CONCEPT DEMO — DESKTOP MODE</div>
</div>

<!-- Game Canvas -->
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div id="stats-bar">
    <div class="stat-block">
      <div class="stat-label">Score</div>
      <div class="stat-value score" id="score-val">0000</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">Health</div>
      <div class="stat-value health" id="health-val">75</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">Wave</div>
      <div class="stat-value wave" id="wave-val">01</div>
    </div>
  </div>

  <div id="crosshair"></div>

  <div id="ammo">
    <div id="ammo-label">AMMO</div>
  </div>

  <div id="killfeed"></div>

  <div id="wave-alert">WAVE 2</div>

  <div id="health-bar-wrap">
    <div id="health-bar-label">NEURAL SHIELD</div>
    <div id="health-bar-bg"><div id="health-bar-fill"></div></div>
  </div>

  <div id="minimap">
    <canvas id="mapCanvas" width="120" height="120"></canvas>
  </div>

  <div id="controls">
    WASD — MOVE<br>
    MOUSE — AIM<br>
    CLICK — SHOOT<br>
    R — RELOAD<br>
    ENTER VR — HEADSET<br>
  </div>

  <button id="vr-btn">⬡ ENTER VR MODE</button>
</div>

<div id="hit-flash"></div>
<div id="shoot-flash"></div>

<script>
// ═══════════════════════════════════════════════
// NEON LABYRINTH — Concept Demo Engine
// ═══════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// State
let W, H;
let gameRunning = false;
let score = 0;
let health = 75;
let wave = 1;
let ammo = 12;
let maxAmmo = 12;
let reloading = false;
let lastTime = 0;
let mouseX = 0, mouseY = 0;
const keys = {};

// Maze config
const CELL = 40;
let mazeW, mazeH;
let maze = [];
let playerPos = { x: 0, y: 0 };
let playerAngle = 0;
let enemies = [];
let bullets = [];
let particles = [];
let powerups = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  mazeW = Math.floor(W / CELL) | 1;
  mazeH = Math.floor(H / CELL) | 1;
  if (mazeW % 2 === 0) mazeW--;
  if (mazeH % 2 === 0) mazeH--;
  if (gameRunning) generateMaze();
}

// ── MAZE GENERATION (Recursive Backtracker) ──
function generateMaze() {
  maze = Array.from({ length: mazeH }, () => Array(mazeW).fill(1));

  function carve(x, y) {
    maze[y][x] = 0;
    const dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(() => Math.random() - 0.5);
    for (const [dx, dy] of dirs) {
      const nx = x + dx, ny = y + dy;
      if (nx > 0 && nx < mazeW && ny > 0 && ny < mazeH && maze[ny][nx] === 1) {
        maze[y + dy/2][x + dx/2] = 0;
        carve(nx, ny);
      }
    }
  }
  carve(1, 1);

  // open border cells
  for (let y = 0; y < mazeH; y++) {
    maze[y][0] = maze[y][mazeW-1] = 1;
  }

  playerPos = { x: 1.5, y: 1.5 };
  spawnEnemies();
  spawnPowerups();
}

function spawnEnemies() {
  enemies = [];
  const count = 3 + wave * 2;
  for (let i = 0; i < count; i++) {
    let ex, ey;
    do {
      ex = (Math.floor(Math.random() * (mazeW - 2) / 2) * 2 + 1) + 0.5;
      ey = (Math.floor(Math.random() * (mazeH - 2) / 2) * 2 + 1) + 0.5;
    } while (Math.hypot(ex - playerPos.x, ey - playerPos.y) < 5);
    enemies.push({
      x: ex, y: ey,
      hp: 1 + Math.floor(wave / 2),
      maxHp: 1 + Math.floor(wave / 2),
      speed: 0.015 + wave * 0.003,
      angle: 0,
      hurtTimer: 0,
      type: Math.random() < 0.2 ? 'heavy' : 'drone'
    });
  }
}

function spawnPowerups() {
  powerups = [];
  for (let i = 0; i < 3; i++) {
    let px, py;
    do {
      px = (Math.floor(Math.random() * (mazeW - 2) / 2) * 2 + 1) + 0.5;
      py = (Math.floor(Math.random() * (mazeH - 2) / 2) * 2 + 1) + 0.5;
    } while (maze[Math.floor(py)][Math.floor(px)] === 1);
    powerups.push({
      x: px, y: py,
      type: ['health', 'ammo', 'speed'][i % 3],
      pulse: Math.random() * Math.PI * 2
    });
  }
}

// ── INPUT ──
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (gameRunning) {
    playerAngle = Math.atan2(mouseY - H/2, mouseX - W/2);
  }
});

document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === 'r' && !reloading && ammo < maxAmmo) startReload();
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

document.addEventListener('click', () => {
  if (gameRunning && !reloading) shoot();
});

// ── SHOOTING ──
function shoot() {
  if (ammo <= 0) { startReload(); return; }
  ammo--;
  updateAmmoUI();

  // Flash
  const sf = document.getElementById('shoot-flash');
  sf.style.opacity = '0.06';
  setTimeout(() => sf.style.opacity = '0', 50);

  // Crosshair hit anim
  const ch = document.getElementById('crosshair');
  ch.classList.add('hit');
  setTimeout(() => ch.classList.remove('hit'), 120);

  const angle = playerAngle;
  bullets.push({
    x: playerPos.x,
    y: playerPos.y,
    vx: Math.cos(angle) * 0.3,
    vy: Math.sin(angle) * 0.3,
    life: 60
  });

  // Muzzle particles
  for (let i = 0; i < 6; i++) {
    particles.push({
      x: playerPos.x * CELL + Math.cos(angle) * 20,
      y: playerPos.y * CELL + Math.sin(angle) * 20,
      vx: Math.cos(angle + (Math.random()-0.5)*0.8) * (2+Math.random()*4),
      vy: Math.sin(angle + (Math.random()-0.5)*0.8) * (2+Math.random()*4),
      life: 15 + Math.random() * 10,
      maxLife: 25,
      color: `hsl(${180 + Math.random()*40}, 100%, 70%)`
    });
  }
}

function startReload() {
  if (reloading) return;
  reloading = true;
  setTimeout(() => {
    ammo = maxAmmo;
    reloading = false;
    updateAmmoUI();
  }, 1500);
}

// ── PHYSICS ──
function canMove(x, y) {
  const margin = 0.35;
  const corners = [
    [x - margin, y - margin],
    [x + margin, y - margin],
    [x - margin, y + margin],
    [x + margin, y + margin],
  ];
  for (const [cx, cy] of corners) {
    const mx = Math.floor(cx), my = Math.floor(cy);
    if (mx < 0 || my < 0 || mx >= mazeW || my >= mazeH) return false;
    if (maze[my][mx] === 1) return false;
  }
  return true;
}

function update(dt) {
  // Player movement
  const spd = 0.08;
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup'])    dy -= spd;
  if (keys['s'] || keys['arrowdown'])  dy += spd;
  if (keys['a'] || keys['arrowleft'])  dx -= spd;
  if (keys['d'] || keys['arrowright']) dx += spd;

  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    dx /= len; dy /= len;
    if (canMove(playerPos.x + dx*spd, playerPos.y)) playerPos.x += dx*spd;
    if (canMove(playerPos.x, playerPos.y + dy*spd)) playerPos.y += dy*spd;
  }

  // Bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy; b.life--;
    if (maze[Math.floor(b.y)]?.[Math.floor(b.x)] === 1) {
      wallHitParticles(b.x * CELL, b.y * CELL);
      return false;
    }
    // Hit enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      if (Math.hypot(b.x - e.x, b.y - e.y) < 0.5) {
        e.hp--;
        e.hurtTimer = 10;
        hitParticles(e.x * CELL, e.y * CELL, '#ff006e');
        if (e.hp <= 0) {
          killParticles(e.x * CELL, e.y * CELL);
          enemies.splice(i, 1);
          score += e.type === 'heavy' ? 200 : 100;
          addKillFeed(e.type === 'heavy' ? 'HEAVY UNIT' : 'DRONE');
          updateScoreUI();
        }
        return false;
      }
    }
    return b.life > 0;
  });

  // Enemy AI
  enemies.forEach(e => {
    if (e.hurtTimer > 0) e.hurtTimer--;
    const dx = playerPos.x - e.x, dy = playerPos.y - e.y;
    const dist = Math.hypot(dx, dy);
    const speed = e.type === 'heavy' ? e.speed * 0.6 : e.speed;
    if (dist > 0.6) {
      const nx = dx/dist * speed, ny = dy/dist * speed;
      if (canMove(e.x + nx, e.y)) e.x += nx;
      if (canMove(e.x, e.y + ny)) e.y += ny;
    }
    e.angle = Math.atan2(dy, dx);

    // Damage player
    if (dist < 0.6) {
      health -= 0.15;
      if (health <= 0) health = 0;
      updateHealthUI();
      document.getElementById('hit-flash').classList.add('flash');
      setTimeout(() => document.getElementById('hit-flash').classList.remove('flash'), 80);
    }
  });

  // Powerup pickup
  powerups = powerups.filter(p => {
    p.pulse += 0.05;
    if (Math.hypot(playerPos.x - p.x, playerPos.y - p.y) < 0.6) {
      if (p.type === 'health') { health = Math.min(100, health + 30); updateHealthUI(); }
      if (p.type === 'ammo')   { ammo = maxAmmo; updateAmmoUI(); }
      pickupParticles(p.x * CELL, p.y * CELL);
      return false;
    }
    return true;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life--;
    return p.life > 0;
  });

  // Wave clear
  if (enemies.length === 0) {
    wave++;
    document.getElementById('wave-val').textContent = String(wave).padStart(2,'0');
    showWaveAlert();
    setTimeout(() => { spawnEnemies(); spawnPowerups(); }, 2500);
  }
}

// ── PARTICLES ──
function hitParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({ x, y,
      vx: Math.cos(a)*(1+Math.random()*3),
      vy: Math.sin(a)*(1+Math.random()*3),
      life: 12, maxLife: 12, color
    });
  }
}
function killParticles(x, y) {
  for (let i = 0; i < 25; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({ x, y,
      vx: Math.cos(a)*(1+Math.random()*6),
      vy: Math.sin(a)*(1+Math.random()*6),
      life: 20+Math.random()*20, maxLife: 40,
      color: `hsl(${300+Math.random()*60}, 100%, 65%)`
    });
  }
}
function wallHitParticles(x, y) {
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({ x, y,
      vx: Math.cos(a)*2, vy: Math.sin(a)*2,
      life: 10, maxLife: 10, color: '#00f5ff'
    });
  }
}
function pickupParticles(x, y) {
  for (let i = 0; i < 15; i++) {
    const a = (i / 15) * Math.PI * 2;
    particles.push({ x, y,
      vx: Math.cos(a)*3, vy: Math.sin(a)*3,
      life: 25, maxLife: 25, color: '#ffe000'
    });
  }
}

// ── RENDER ──
function render(t) {
  ctx.fillStyle = '#020408';
  ctx.fillRect(0, 0, W, H);

  // Maze
  const offsetX = W/2 - playerPos.x * CELL;
  const offsetY = H/2 - playerPos.y * CELL;

  ctx.save();
  ctx.translate(offsetX, offsetY);

  // Floor glow
  ctx.fillStyle = 'rgba(0,50,80,0.3)';
  for (let y = 0; y < mazeH; y++) {
    for (let x = 0; x < mazeW; x++) {
      if (maze[y][x] === 0) {
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
      }
    }
  }

  // Walls
  for (let y = 0; y < mazeH; y++) {
    for (let x = 0; x < mazeW; x++) {
      if (maze[y][x] === 1) {
        const grd = ctx.createLinearGradient(x*CELL, y*CELL, x*CELL+CELL, y*CELL+CELL);
        grd.addColorStop(0, '#0a1628');
        grd.addColorStop(1, '#050e1a');
        ctx.fillStyle = grd;
        ctx.fillRect(x*CELL, y*CELL, CELL, CELL);

        // Neon edge
        ctx.strokeStyle = 'rgba(0,245,255,0.2)';
        ctx.lineWidth = 1;
        ctx.strokeRect(x*CELL+0.5, y*CELL+0.5, CELL-1, CELL-1);
      }
    }
  }

  // Grid lines on floor
  ctx.strokeStyle = 'rgba(0,245,255,0.04)';
  ctx.lineWidth = 1;
  for (let y = 0; y < mazeH; y++) {
    for (let x = 0; x < mazeW; x++) {
      if (maze[y][x] === 0) {
        ctx.strokeRect(x*CELL, y*CELL, CELL, CELL);
      }
    }
  }

  // Powerups
  powerups.forEach(p => {
    const px = p.x * CELL, py = p.y * CELL;
    const colors = { health: '#00ff88', ammo: '#00f5ff', speed: '#ffe000' };
    const c = colors[p.type];
    const r = 6 + Math.sin(p.pulse) * 2;

    ctx.shadowColor = c;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI*2);
    ctx.fillStyle = c;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ring
    ctx.beginPath();
    ctx.arc(px, py, 12 + Math.sin(p.pulse)*3, 0, Math.PI*2);
    ctx.strokeStyle = c + '66';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Bullets
  bullets.forEach(b => {
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 15;
    ctx.beginPath();
    ctx.arc(b.x*CELL, b.y*CELL, 4, 0, Math.PI*2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    // Trail
    ctx.beginPath();
    ctx.moveTo(b.x*CELL, b.y*CELL);
    ctx.lineTo((b.x-b.vx*3)*CELL, (b.y-b.vy*3)*CELL);
    ctx.strokeStyle = 'rgba(0,245,255,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  // Enemies
  enemies.forEach(e => {
    const ex = e.x * CELL, ey = e.y * CELL;
    const isHurt = e.hurtTimer > 0;
    const isHeavy = e.type === 'heavy';

    ctx.shadowColor = isHeavy ? '#ff006e' : '#8b00ff';
    ctx.shadowBlur = 20;

    if (isHeavy) {
      // Diamond shape
      ctx.save();
      ctx.translate(ex, ey);
      ctx.rotate(e.angle + Math.PI/4);
      ctx.fillStyle = isHurt ? '#ffffff' : '#ff006e';
      ctx.fillRect(-10, -10, 20, 20);
      ctx.restore();
    } else {
      // Drone — hexagon
      ctx.save();
      ctx.translate(ex, ey);
      ctx.rotate(t * 0.001 + e.x);
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        ctx[i===0?'moveTo':'lineTo'](Math.cos(a)*9, Math.sin(a)*9);
      }
      ctx.closePath();
      ctx.fillStyle = isHurt ? '#ffffff' : '#8b00ff';
      ctx.fill();
      ctx.restore();
    }

    // HP bar
    if (e.maxHp > 1) {
      const bw = 24, bh = 3;
      ctx.fillStyle = '#111';
      ctx.fillRect(ex - bw/2, ey - 18, bw, bh);
      ctx.fillStyle = '#ff006e';
      ctx.fillRect(ex - bw/2, ey - 18, bw * (e.hp/e.maxHp), bh);
    }

    ctx.shadowBlur = 0;

    // Direction indicator
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex + Math.cos(e.angle)*14, ey + Math.sin(e.angle)*14);
    ctx.strokeStyle = 'rgba(255,0,110,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  });

  // Particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2 + alpha*2, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;

  // Player
  const px = playerPos.x * CELL, py = playerPos.y * CELL;
  
  // Player glow
  const radGrd = ctx.createRadialGradient(px, py, 0, px, py, 30);
  radGrd.addColorStop(0, 'rgba(0,245,255,0.15)');
  radGrd.addColorStop(1, 'transparent');
  ctx.fillStyle = radGrd;
  ctx.beginPath();
  ctx.arc(px, py, 30, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 25;
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(playerAngle);
  ctx.fillStyle = '#00f5ff';
  ctx.beginPath();
  ctx.moveTo(12, 0);
  ctx.lineTo(-8, 7);
  ctx.lineTo(-5, 0);
  ctx.lineTo(-8, -7);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Aim line
  ctx.beginPath();
  ctx.moveTo(px + Math.cos(playerAngle)*15, py + Math.sin(playerAngle)*15);
  ctx.lineTo(px + Math.cos(playerAngle)*60, py + Math.sin(playerAngle)*60);
  ctx.strokeStyle = 'rgba(0,245,255,0.25)';
  ctx.setLineDash([4, 8]);
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore(); // end camera transform

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.9);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.7)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  drawMiniMap();
}

// ── MINI MAP ──
function drawMiniMap() {
  const mc = document.getElementById('mapCanvas');
  const mx = mc.getContext('2d');
  const mw = 120, mh = 120;
  const cw = mw / mazeW, ch = mh / mazeH;

  mx.fillStyle = 'rgba(0,0,0,0.8)';
  mx.fillRect(0, 0, mw, mh);

  for (let y = 0; y < mazeH; y++) {
    for (let x = 0; x < mazeW; x++) {
      mx.fillStyle = maze[y][x] === 1 ? 'rgba(0,245,255,0.3)' : 'rgba(0,245,255,0.06)';
      mx.fillRect(x*cw, y*ch, cw, ch);
    }
  }

  // Enemies on map
  enemies.forEach(e => {
    mx.fillStyle = '#ff006e';
    mx.beginPath();
    mx.arc(e.x*cw, e.y*ch, 2, 0, Math.PI*2);
    mx.fill();
  });

  // Player on map
  mx.fillStyle = '#00f5ff';
  mx.shadowColor = '#00f5ff';
  mx.shadowBlur = 6;
  mx.beginPath();
  mx.arc(playerPos.x*cw, playerPos.y*ch, 3, 0, Math.PI*2);
  mx.fill();
  mx.shadowBlur = 0;
}

// ── UI HELPERS ──
function updateScoreUI() {
  document.getElementById('score-val').textContent = String(score).padStart(4,'0');
}
function updateHealthUI() {
  health = Math.max(0, Math.min(100, health));
  document.getElementById('health-val').textContent = Math.floor(health);
  document.getElementById('health-bar-fill').style.width = health + '%';
  const hv = document.getElementById('health-val');
  hv.style.color = health > 50 ? '#00ff88' : health > 25 ? '#ffe000' : '#ff006e';
}
function updateAmmoUI() {
  const el = document.getElementById('ammo');
  el.innerHTML = '<div id="ammo-label">AMMO</div>';
  for (let i = 0; i < maxAmmo; i++) {
    const d = document.createElement('div');
    d.className = 'ammo-dot' + (i >= ammo ? ' used' : '');
    el.appendChild(d);
  }
}
function addKillFeed(name) {
  const kf = document.getElementById('killfeed');
  const el = document.createElement('div');
  el.className = 'kill-entry';
  el.textContent = `+ ${name} DOWN`;
  kf.appendChild(el);
  setTimeout(() => el.remove(), 2100);
}
function showWaveAlert() {
  const wa = document.getElementById('wave-alert');
  wa.textContent = `WAVE ${wave}`;
  wa.classList.add('show');
  setTimeout(() => wa.classList.remove('show'), 2500);
}

// ── GAME LOOP ──
function gameLoop(t) {
  if (!gameRunning) return;
  const dt = t - lastTime;
  lastTime = t;
  update(dt);
  render(t);
  requestAnimationFrame(gameLoop);
}

function startGame() {
  const ts = document.getElementById('title-screen');
  ts.classList.add('hidden');
  setTimeout(() => ts.style.display = 'none', 800);

  gameRunning = true;
  generateMaze();
  updateAmmoUI();
  updateHealthUI();
  updateScoreUI();

  showWaveAlert();
  setTimeout(() => {
    lastTime = performance.now();
    requestAnimationFrame(gameLoop);
  }, 100);
}

// ── VR CHECK ──
document.getElementById('vr-btn').addEventListener('click', async () => {
  if (navigator.xr) {
    const supported = await navigator.xr.isSessionSupported('immersive-vr').catch(() => false);
    if (supported) {
      alert('VR headset detected! Full WebXR implementation would launch here.\n\nThis demo shows the 2D concept. The full build uses Three.js + WebXR for immersive 3D rendering.');
    } else {
      alert('No VR headset detected.\n\nTo experience in VR, connect an Oculus Quest, HTC Vive, or any WebXR-compatible headset.\n\nThis demo runs in desktop mode for concept preview.');
    }
  } else {
    alert('WebXR not supported in this browser.\n\nUse Chrome or Edge with a VR headset for the full experience.');
  }
});

window.addEventListener('resize', resize);
resize();
